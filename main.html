<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligtas-Patas</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://kit.fontawesome.com/d65d73018d.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet"> 
</head>
<body>
    <!-- Navbar Section -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"> 
                <i class="fa-solid fa-cloud-sun-rain"></i> <strong>WEATHER</strong>
            </a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="./index.html" class="navbar__links">
                        <i class="fa-regular fa-house"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="./reports.html" class="navbar__links">
                        <i class="fa-solid fa-walkie-talkie"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="./about.html" class="navbar__links">About</a>
                </li>
                <li class="navbar__btn">
                    <a href="./main.html" class="button" id="loginBtn">Log In</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="main"> 
        <div class="main__container">
            <div class="main__content">
                <h1>WEATHER UPDATE</h1>
                <h2>LIGTAS-PATAS</h2>
                <p>Control Center Admin</p>
                <button class="main__btn" id="adminLoginBtn"><a href="adminlogin.html"> <i class="fa-solid fa-right-to-bracket"></i> 
                    <strong>ADMIN LOG IN</strong></a>
                </button>

                <!-- ── ADMIN INFO CARD + LOGOUT (shown only when logged in) ── -->
                <div class="admin-card" id="adminCard" style="display:none;">
                    <div class="admin-label">🔐 Currently Logged In</div>
                    <div class="admin-name">👤 Admin</div>
                    <div class="admin-status">
                        <span class="status-dot"></span>
                        Active Session
                    </div>
                </div>

                <button class="logout-btn" id="logoutBtn" style="display:none;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
            </div>

            <div class="main__img--container">
                <img src="pic1.svg" alt="pic" id="main__img">
            </div>
        </div>
    </div>

    <!-- Only load app.js here — login.js is only for adminlogin.html -->
    <script src="login.js"></script>
    <script src="app.js"></script>
</body> 
</html>
